services:
  db:
    image: mysql:8.0
    container_name: notes_app_db
    restart: always
    environment:
      MYSQL_DATABASE: notes_app
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    volumes:
      - db_data:/var/lib/mysql
      # Uncomment the next line if you want to initialize the database with a script
      # - ./notes_app.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3307:3306"

  app:
    build: .
    container_name: notes_app_web
    restart: always
    ports:
      - "8080:80"
    environment:
      DB_HOST: db
      DB_NAME: notes_app
      DB_USER: root
      DB_PASS: ""
    depends_on:
      - db

volumes:
  db_data:
